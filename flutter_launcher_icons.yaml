flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/launcher_ic.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  # Android Adaptive Icons (The fix for "square in square")
